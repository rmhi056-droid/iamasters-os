<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #444;
    --accent: #003a5d;
    --accent-soft: #5b8db2;
    --bg: #ffffff;
    --rule: #d8d8d8;
    --highlight-bg: #f5f1e8;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Georgia", "Source Serif Pro", serif;
    color: var(--ink);
    background: var(--bg);
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 40px;
    line-height: 1.7;
    font-size: 17px;
  }
  header.cover {
    border-bottom: 3px double var(--accent);
    padding-bottom: 30px;
    margin-bottom: 40px;
  }
  header.cover h1 {
    font-size: 2.4em;
    margin: 0 0 10px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header.cover .meta {
    color: var(--ink-soft);
    font-family: "Helvetica Neue", "Arial", sans-serif;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  h2 {
    font-family: "Helvetica Neue", "Arial", sans-serif;
    color: var(--accent);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 8px;
    margin-top: 50px;
    font-size: 1.6em;
    font-weight: 600;
  }
  h3 {
    font-family: "Helvetica Neue", "Arial", sans-serif;
    color: var(--ink);
    margin-top: 35px;
    font-size: 1.2em;
    font-weight: 600;
  }
  p { margin: 1em 0; text-align: justify; }
  blockquote {
    border-left: 4px solid var(--accent);
    margin: 1.5em 0;
    padding: 0.5em 1.5em;
    background: var(--highlight-bg);
    font-style: italic;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 1.5em 0;
    font-size: 0.95em;
  }
  th, td {
    border: 1px solid var(--rule);
    padding: 10px 14px;
    text-align: left;
  }
  th {
    background: var(--accent);
    color: white;
    font-family: "Helvetica Neue", "Arial", sans-serif;
    font-weight: 600;
  }
  tr:nth-child(even) { background: #fafafa; }
  code {
    font-family: "SF Mono", "Monaco", monospace;
    background: #f0ede5;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 0.9em;
  }
  pre {
    background: #f0ede5;
    padding: 16px;
    border-radius: 5px;
    overflow-x: auto;
  }
  sup.citation a {
    color: var(--accent);
    text-decoration: none;
    font-weight: bold;
    padding: 0 2px;
  }
  sup.citation a:hover { text-decoration: underline; }
  nav.toc {
    background: #f9f7f1;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 20px 30px;
    margin: 30px 0;
    font-family: "Helvetica Neue", "Arial", sans-serif;
    font-size: 0.95em;
  }
  nav.toc h2 {
    margin-top: 0;
    border: none;
    padding: 0;
    font-size: 1.2em;
  }
  nav.toc ul { list-style: none; padding-left: 0; }
  nav.toc li { margin: 4px 0; }
  nav.toc li.toc-h3 { padding-left: 20px; font-size: 0.92em; color: var(--ink-soft); }
  nav.toc a { color: var(--accent); text-decoration: none; }
  nav.toc a:hover { text-decoration: underline; }
  .executive-summary {
    background: var(--highlight-bg);
    border-left: 5px solid var(--accent);
    padding: 25px 30px;
    margin: 30px 0;
  }
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    color: var(--ink-soft);
    font-size: 0.85em;
    font-family: "Helvetica Neue", "Arial", sans-serif;
    text-align: center;
  }
  @media print {
    body { padding: 0; max-width: 100%; font-size: 11pt; }
    h2 { page-break-after: avoid; }
    nav.toc { page-break-after: always; }
    sup.citation a { color: var(--accent); }
  }
  @media (max-width: 600px) {
    body { padding: 30px 20px; font-size: 16px; }
    header.cover h1 { font-size: 1.8em; }
  }
</style>
</head>
<body>
<header class="cover">
  <h1>{{TITLE}}</h1>
  <p class="meta">{{SUBTITLE}} · {{DATE}} · Modo: {{MODE}} · {{SOURCES_COUNT}} fuentes · {{WORD_COUNT}} palabras</p>
</header>
{{TOC}}
<main>
{{CONTENT}}
</main>
<footer>
  Generado por la skill <strong>investigacion-profunda</strong> · {{GENERATED_AT}}
</footer>
</body>
</html>
